name: jawan_delivery
description: Jawan Delivery - Flutter app for client, driver, and admin.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/docs/
